name = "mortgage-renewals"
compatibility_date = "2026-07-18"
compatibility_flags = ["nodejs_compat"]
main = "@astrojs/cloudflare/entrypoints/server"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[assets]
directory = "./dist/client"
binding = "ASSETS"
# SSR routes only exist in the Worker. Limit Worker-first to those prefixes so
# static HTML stays on the CDN path.
not_found_handling = "404-page"
run_worker_first = [
  "/api/*",
  "/book-a-call/",
  "/book/*",
  "/faq/",
  "/investment-property-mortgage-renewal/",
  "/mortgage-renewal-divorce-separation/",
]
