name: Auto-merge freshness PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR details
        id: pr
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"

          if [ "$AUTHOR" != "cursor[bot]" ] && [[ ! "$HEAD_REF" =~ ^cursor/ ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          if gh pr merge "$PR_NUM" --auto --squash 2>/dev/null; then
            echo "Auto-merge enabled for PR #$PR_NUM"
          elif gh pr view "$PR_NUM" --json autoMergeRequest -q '.autoMergeRequest.enabledAt // empty' | grep -q .; then
            echo "Auto-merge already enabled for PR #$PR_NUM"
          else
            echo "Could not enable auto-merge yet"
          fi
